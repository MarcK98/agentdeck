<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" width="1120" height="560" role="img" aria-label="AgentDeck architecture">
  <defs>
    <linearGradient id="b" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8f88ff"/>
      <stop offset="1" stop-color="#59d8ff"/>
    </linearGradient>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8f88ff"/>
    </marker>
    <style>
      .t   { font-family: 'Space Grotesk','Segoe UI',system-ui,sans-serif; font-weight: 700; fill: #f2f3ff; }
      .s   { font-family: 'JetBrains Mono',ui-monospace,Menlo,monospace; fill: #9aa0d0; }
      .lbl { font-family: 'JetBrains Mono',ui-monospace,Menlo,monospace; fill: #7f85b8; }
      .box { fill: #12142b; stroke: #2c3060; stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1120" height="560" fill="#0b0c1a"/>

  <!-- "on your Mac" boundary -->
  <rect x="28" y="40" width="700" height="490" rx="18" fill="#0e1022" stroke="#2c3060" stroke-width="1.5" stroke-dasharray="6 6"/>
  <text x="52" y="72" class="s" font-size="15" fill="#59d8ff">◆ your Mac  (localhost only)</text>

  <!-- Desktop -->
  <rect class="box" x="60" y="100" width="250" height="96" rx="14"/>
  <text x="80" y="140" class="t" font-size="21">Desktop app</text>
  <text x="80" y="166" class="s" font-size="14">@agentdeck/desktop</text>
  <text x="80" y="185" class="s" font-size="13" fill="#6b70a0">Electron + React</text>

  <!-- Daemon -->
  <rect class="box" x="60" y="270" width="290" height="150" rx="14"/>
  <rect x="60" y="270" width="290" height="150" rx="14" fill="url(#b)" opacity="0.06"/>
  <text x="80" y="310" class="t" font-size="21">Daemon</text>
  <text x="80" y="336" class="s" font-size="14">@agentdeck/core</text>
  <text x="80" y="362" class="s" font-size="13" fill="#6b70a0">owns sessions · threads</text>
  <text x="80" y="381" class="s" font-size="13" fill="#6b70a0">team lead · approvals · usage</text>
  <text x="80" y="404" class="s" font-size="13" fill="#59d8ff">127.0.0.1:8810</text>

  <!-- SQLite -->
  <rect class="box" x="60" y="452" width="180" height="58" rx="12"/>
  <text x="80" y="480" class="t" font-size="16">SQLite</text>
  <text x="80" y="499" class="s" font-size="12" fill="#6b70a0">agentdeck.db</text>

  <!-- Claude CLI -->
  <rect x="440" y="290" width="250" height="110" rx="14" fill="#12142b" stroke="url(#b)" stroke-width="2"/>
  <text x="462" y="330" class="t" font-size="21">Claude Code</text>
  <text x="462" y="356" class="s" font-size="14" fill="#c7cbf0">claude -p</text>
  <text x="462" y="382" class="s" font-size="13" fill="#6b70a0">runs inside each project</text>

  <!-- Relay (cloud) -->
  <rect class="box" x="820" y="118" width="250" height="100" rx="14"/>
  <text x="842" y="156" class="t" font-size="21">Relay hub</text>
  <text x="842" y="182" class="s" font-size="14">@agentdeck/relay</text>
  <text x="842" y="201" class="s" font-size="13" fill="#6b70a0">Fly / Railway / any Node host</text>

  <!-- Mobile -->
  <rect class="box" x="860" y="330" width="170" height="180" rx="20"/>
  <rect x="882" y="356" width="126" height="118" rx="8" fill="#0e1022" stroke="#2c3060"/>
  <circle cx="945" cy="492" r="7" fill="#2c3060"/>
  <text x="945" y="416" class="t" font-size="17" text-anchor="middle">Mobile</text>
  <text x="945" y="440" class="s" font-size="12" fill="#6b70a0" text-anchor="middle">Expo /</text>
  <text x="945" y="456" class="s" font-size="12" fill="#6b70a0" text-anchor="middle">Expo Go</text>

  <!-- connectors -->
  <!-- desktop <-> daemon -->
  <line x1="185" y1="196" x2="185" y2="270" stroke="#8f88ff" stroke-width="2" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text x="196" y="240" class="lbl" font-size="12">RPC + WS · token</text>

  <!-- daemon -> claude -->
  <line x1="350" y1="345" x2="440" y2="345" stroke="#8f88ff" stroke-width="2" marker-end="url(#arw)"/>
  <text x="356" y="335" class="lbl" font-size="12">spawn</text>

  <!-- daemon -> sqlite -->
  <line x1="150" y1="420" x2="150" y2="452" stroke="#8f88ff" stroke-width="2" marker-end="url(#arw)"/>

  <!-- daemon -> relay (dials out) -->
  <path d="M 350 300 C 560 250, 640 168, 820 168" fill="none" stroke="#59d8ff" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arw)"/>
  <text x="470" y="250" class="lbl" font-size="12" fill="#59d8ff">daemon dials OUT · WSS</text>

  <!-- relay <-> mobile -->
  <line x1="945" y1="218" x2="945" y2="330" stroke="#8f88ff" stroke-width="2" marker-start="url(#arw)" marker-end="url(#arw)"/>
  <text x="956" y="280" class="lbl" font-size="12">authenticated</text>
</svg>
