<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="AgentDeck — a mastermind for Claude">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8f88ff"/>
      <stop offset="1" stop-color="#59d8ff"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8f88ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#8f88ff"/>
      <stop offset="1" stop-color="#59d8ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#8f88ff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8f88ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#59d8ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#59d8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .wm  { font-family: 'Space Grotesk','Segoe UI',system-ui,-apple-system,sans-serif; font-weight: 700; }
      .mono{ font-family: 'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,monospace; }
      .body{ font-family: 'Space Grotesk','Segoe UI',system-ui,-apple-system,sans-serif; }
    </style>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="360" fill="#0b0c1a"/>
  <rect width="1280" height="360" fill="url(#glow)"/>
  <rect width="1280" height="360" fill="url(#glow2)"/>

  <!-- agent constellation (right) -->
  <g stroke="url(#brand)" stroke-width="1.4" opacity="0.5" fill="none">
    <path d="M 940 92 L 1064 150 M 1064 150 L 1150 96 M 1064 150 L 1132 232 M 1064 150 L 968 220 M 968 220 L 900 288 M 1132 232 L 1188 176"/>
  </g>
  <g fill="#0b0c1a" stroke="url(#brand)" stroke-width="1.6">
    <circle cx="940"  cy="92"  r="6"/>
    <circle cx="1150" cy="96"  r="6"/>
    <circle cx="1132" cy="232" r="6"/>
    <circle cx="968"  cy="220" r="6"/>
    <circle cx="900"  cy="288" r="6"/>
    <circle cx="1188" cy="176" r="6"/>
  </g>
  <!-- central deck node -->
  <circle cx="1064" cy="150" r="13" fill="url(#brand)" opacity="0.28" filter="url(#soft)"/>
  <circle cx="1064" cy="150" r="8.5" fill="url(#brand)"/>

  <!-- logo mark: two 45deg rounded squares stacked -->
  <g transform="translate(118 150)">
    <rect x="-33" y="-52" width="66" height="66" rx="16" transform="rotate(45)" fill="#2c3060"/>
    <rect x="-33" y="-14" width="66" height="66" rx="16" transform="rotate(45)" fill="url(#brand)"/>
    <rect x="-33" y="-14" width="66" height="66" rx="16" transform="rotate(45)" fill="url(#brand)" opacity="0.35" filter="url(#soft)"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="210" y="150" class="wm" font-size="74" fill="#f2f3ff" letter-spacing="-1.5">AgentDeck</text>
  <text x="212" y="196" class="body" font-size="27" fill="#a7abd6">A mastermind for <tspan fill="url(#brand)" font-weight="600">Claude</tspan></text>

  <!-- tagline chip -->
  <g transform="translate(212 232)">
    <rect x="0" y="0" width="250" height="40" rx="20" fill="#12142b" stroke="#2c3060"/>
    <circle cx="24" cy="20" r="4.5" fill="url(#brand)"/>
    <text x="42" y="26" class="mono" font-size="16" fill="#c7cbf0">Every agent. One deck.</text>
  </g>

  <!-- bottom hairline -->
  <rect x="0" y="330" width="1280" height="2" fill="url(#hair)"/>
</svg>
